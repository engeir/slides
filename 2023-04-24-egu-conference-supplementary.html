## Motivation

<!-- .slide: data-background-color="#001928" -->
<!-- .slide: data-visibility="hidden" -->
</script></section><section data-markdown><script type="text/template">
<!-- .slide: data-background-color="#001928" -->
<!-- .slide: data-background-size="contain" -->

<!-- .slide: data-background-color="#001928" -->
<!-- .slide: data-background-size="contain" -->
<!-- .slide: data-background="https://raw.githubusercontent.com/engeir/presentations/dd0a662/2023/egu23/assets/toa-all-strengths.webp" -->
</script></section><section data-markdown><script type="text/template">
<!-- .slide: data-background-color="#001928" -->

Using a linear operator to describe temperature fluctuations:

<!-- dprint-ignore-start -->

$$
\Delta T(t)=\hat{L}[f_K(t)]
$$

$$
\Delta T(t)=\phi\ast f_K(t)=\phi\ast\sum_k A_k\delta(t-t_k)
$$

<!-- dprint-ignore-end -->

<aside class="notes"><p>The first equation show the linear relation between some forcing 𝑓(𝑡) and the
deterministic temperature fluctuation due to the forcing.</p>
<p>We wish to look further into the linearity assumption in relation to volcanoes over a
large range of eruption magnitudes (total injected SO2).</p>
<p>Can we write up the temperature response to volcanic eruptions as a convolution between
the forcing and some general shape function, here represented by the letter 𝜙?</p>
<p>The forcing is here consisting only of forcing due to episodic volcanoes, where 𝐴
represent the amplitude of a given volcanic event arriving at time 𝑡_𝑘.</p>
</aside></script></section><section data-markdown><script type="text/template">
<!-- .slide: data-background-color="#001928" -->

<!-- dprint-ignore-start -->

`$$
\Delta T(t)=\phi\ast f_K(t)=\phi\ast\sum_k A_k\delta(t-t_k)
$$`

`$$
A_k\left\{
\begin{aligned}
&\overset{?}{=}g(M_k^{\max})\\
&\overset{?}{=}M_k^{\max}
\end{aligned}
\right.,\,
M=\left\{
\begin{aligned}
&\mathrm{SO_2\,[Tg]}\\
&\mathrm{AOD\,[1]}\\
&\mathrm{TOA\,[W/m^2]}
\end{aligned}
\right.
$$`

<!-- dprint-ignore-end -->

where `$M_k^{\max}$` is the peak magnitude of event `$k$`.

<!-- .element: style="font-size:20pt" -->

<aside class="notes"><p>If so, what representation of the forcing should one use? Do we perhaps need a
non-linear transformation (𝑔(⋅)) of the forcing to be able to get temperature from
convolutions?</p>
<p>We consider three different sources to describe the forcing; total injected SO2 in Tg,
the aerosol optical depth and forcing as top-of-the-atmosphere radiative forcing.</p>
<p>(Injected SO2 is used as model input to simulate the volcanoes, while both AOD and
radiative forcing are output variables of the model.)</p>
</aside></script></section></section><section ><section data-markdown><script type="text/template">
