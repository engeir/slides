# Aerosol optical depth dependency from large volcanic eruptions

<!-- .element: style="font-size:50pt" -->

_[**Eirik Rolland Enger**](mailto:eirik.r.enger@uit.no), Audun Theodorsen, Maria
Rugenstein, Rune Graversen_

<!-- .element: style="font-size:18pt" -->

<img
src="https://raw.githubusercontent.com/engeir/presentations/dd0a662/2023/egu23/assets/UiT_Logo_Eng_2l_Hvit.png"
width="auto" height="110px" />

<aside class="notes"><p>My name is Eirik Enger, and I&#39;m a PhD candidate at UiT the Arctic University of Norway.
My work focus on how volcanoes affect climate, and today we will look at &quot;Aerosol
optical depth dependency from large volcanic eruptions&quot;.</p>
<p><em>(The abstract has the title &quot;Insensitivity of global temperature response to the
magnitude of volcanic eruptions&quot;, but the contents of this talk has been adjusted
somewhat since the submission).</em></p>
</aside></script></section><section data-markdown><script type="text/template">
<!-- .slide: data-visibility="hidden" -->

## Background
</script></section><section data-markdown><script type="text/template">
Volcanic eruptions are <span style="color:yellow;">short-lived</span> and results in
<span style="color:yellow;">large perturbations</span> in global mean surface
temperature.

<aside class="notes"><p>Why volcanoes? Their impact on temperature is easy to see in the background noise; large
volcanic eruptions leave a short-lived but big perturbation of the global mean
temperature.</p>
</aside></script></section><section data-markdown><script type="text/template">
_Figure from
<a href="https://doi.org/10.1038/nature14565" data-citation-key="@sigl2015">Sigl et al.
(2015)</a>_

<!-- .element: style="font-size:13pt" -->

![Sigl et al. (2015)](https://raw.githubusercontent.com/engeir/presentations/96eb73f/2023/fysikermotet23/assets/2015-sigl-volcanoes-swap.png)

<aside class="notes"><p>This figure is from
<a href="https://doi.org/10.1038/nature14565" data-citation-key="@sigl2015">Sigl et al.
(2015)</a>, and is showing global volcanic aerosol forcing and Northern Hemisphere
temperature variations over the last $2500$ years.</p>
<p>One can clearly spot the impact on temperature the largest volcanic eruptions had,
giving temperature perturbations well above the noise floor. The temperature then
reverts to its equilibrium state within few years.</p>
<blockquote>
<p>Plot from <a href="https://doi.org/10.1038/nature14565">Sigl et al. (2015)</a>, figure 3.</p>
</blockquote>
</aside></script></section></section><section ><section data-markdown><script type="text/template">
## Motivation

<!-- .slide: data-background-color="#001928" -->
<!-- .slide: data-visibility="hidden" -->
</script></section><section data-markdown><script type="text/template">
<!-- .slide: data-background-color="#001928" -->
<!-- .slide: id="gregory" -->

_Figure from
<a href="https://doi.org/10.1007/s00382-016-3055-1" data-citation-key="@gregory2016">Gregory
et al. (2016)</a>_

<!-- .element: style="font-size:13pt" -->

![Gregory AOD vs forcing](https://raw.githubusercontent.com/engeir/presentations/dd0a662/2023/egu23/assets/gregory-aod-toa-swap-trans.png)

<!-- .element: class="r-stretch" -->

<aside class="notes"><p>This plot is from <a href="https://doi.org/10.1007/s00382-016-3055-1">Gregory et al. (2016)</a>,
and it&#39;s showing radiative forcing against aerosol optical depth, where radiative
forcing is a measure of the energy imbalance of the Earth and AOD is a measure of the
opacity of the stratosphere
(<a href="https://doi.org/10.1029/2020GL090241">Marshall et al. 2020</a>) (also from
<a href="10.5194/acp-17-14871-2017">Niemeier and Schmidt (2017)</a>, &quot;a measure of turbidity and
degradation of sunlight&quot;). Two simulations were done by the authors using the HadCM3
climate model, one simulation by
<a href="http://dx.doi.org/10.1175/JCLI-D-13-00336.1">Andrews (2014)</a> used the HadGEM2 climate
model while the AR5 data points are from the Fifth Assessment report of the IPCC
(intergovernmental panel on climate change). Gradient lines have slopes of -26.6, -24.6,
-19, -17.</p>
<p>This show a proportionality between annual mean values of AOD and radiative forcing, but
only for AOD values up to 0.15, roughly equivalent to the peak of the 1991 Mt. Pinatubo
eruption. Whether this property holds as one goes to much greater values, for example
comparable to the Young Toba Tuff eruption 74ky ago, is of interest to us. Such a super
volcano would have roughly one hundred times the AOD values as Mt. Pinatubo, but
previous simulations indicate radiative forcing values that are only about twenty times
that of Mt. Pinatubo. Is this because the linearity does not hold for this large values,
or is it a <strong>shortcoming on the model&#39;s side</strong>?</p>
<p>Can we make a similar comparison of the peak values, for example in daily resolution (as
opposed to averaging over the whole year before comparing)?</p>
<blockquote>
<p>Plot from <a href="https://doi.org/10.1007/s00382-016-3055-1">Gregory et al. (2016)</a>,
figure 4.</p>
</blockquote>
</aside></script></section><section data-markdown><script type="text/template">
<!-- .slide: data-background-color="#001928" -->

### Simulations

- CESM2 (Community Earth System Model, version 2.1.3)
  <!-- .element: class="fragment" -->
- WACCM6 atmosphere <!-- .element: class="fragment" -->
- Dynamic ocean and prescribed sea-surface temperature conditions (AOGCM & AGCM)
  <!-- .element: class="fragment" -->

<aside class="notes"><p>Simulations are carried out with the Community Earth System Model, version 2.1.3, and
using the WACCM6 high-top atmosphere component, specifically in a nominal two degree
resolution and the &quot;middle atmosphere&quot; component setting. Both simulations with a
dynamic ocean (i.e., running the model as an AOGCM) and prescribed sea-surface
temperature conditions (i.e., a AGCM) have been done.</p>
</aside></script></section><section data-markdown><script type="text/template">
<!-- .slide: data-background-color="#001928" -->
<!-- .slide: data-background-size="contain" -->
<!-- .slide:
data-background="https://raw.githubusercontent.com/engeir/presentations/dd0a662/2023/egu23/assets/temperature-all-strengths.webp"
-->

<aside class="notes"><p>We here see the three main simulations that have been run, of individual volcanic
eruptions at the equator with three different magnitudes defined by inputting different
amounts of SO2 into the atmosphere.</p>
<p>We are specifically looking at the temperature response from the three different
eruption magnitudes, where the notation of a downward arrow, horizontal line and upward
arrow will be used to indicate the different magnitudes of a weak, medium and strong
eruption, respectively.</p>
</aside></script></section><section data-markdown><script type="text/template">
<!-- .slide: data-state="blur" -->
<!-- .slide: data-background-color="#001928" -->
<!-- .slide: data-background-size="contain" -->

data-background="https://raw.githubusercontent.com/engeir/presentations/dd0a662/2023/egu23/assets/temperature-all-strengths.webp"
-->
<!-- .slide: data-background-opacity="0.10" -->

- At the equator
- <!-- .element: class="fragment" data-fragment-index="1" -size:29pt" --> $\mathrm{SO_2}$ injected at $18$–$20$
  `$\mathrm{km}$` altitude
- <!-- .element: class="fragment" data-fragment-index="2" -size:29pt" --> $\mathrm{SO_2}$ amounts:
  - `$26\,\mathrm{Tg}$`(↓)
  - `$400\,\mathrm{Tg}$`(—)
  - `$1629\,\mathrm{Tg}$`(↑)

> Tg = tera gram = Mt = mega tons = $10^{12}$ grams

<!-- .element: style="font-size:20pt" -->
<!-- .element: class="fragment" data-fragment-index="2" -->

[_Back up_](#/gregory)

<!-- .element: style="font-size:13pt" -->

<aside class="notes"><p>The volcanoes were created from an equatorial eruption, with the SO2 injected between 18
and 20 km altitude. The amounts of injected SO2 were 26 Tg (similar to Mt. Pinatubo),
400 Tg (similar to the 1257 Samalas eruption) and 1629 Tg (same order of magnitude as
Young Toba Tuff ~74 ky ago) of SO2 into the atmosphere between 18 and 20 km height.</p>
<blockquote>
<p>Tg = tera gram = Mt = mega tons = 1e12 grams</p>
</blockquote>
</aside></script></section><section data-markdown><script type="text/template">
<!-- .slide: data-visibility="hidden" -->
<!-- .slide: data-background-color="#001928" -->
<!-- .slide: data-background-size="contain" -->
<!-- .slide:
data-background="https://raw.githubusercontent.com/engeir/presentations/dd0a662/2023/egu23/assets/double-overlap-superpose.webp"
-->

<aside class="notes"><p>Let us say we take the medium-sized volcano and let it erupt twice with four years
apart. This is what we see here in blue, with two copies of the medium-sized volcano
shown in orange, aligned so that the eruptions occur at the same time (the shadings mark
the two regions of the single events). Superposing the two orange individual eruption
time series gives the green time series.</p>
<p>The volcano erupted first on 15. February 1853 and then on the same day in 1857.</p>
<p>From this initial simulation of overlapping pulses, the superposing of temperature
response is relatively good, motivating further analysis of the linearity (or lack
thereof) of the temperature response. From this alone one might expect that temperature
does indeed respond linearly to <em>some representation</em> of the radiative forcing.</p>
</aside></script></section></section><section ><section data-markdown><script type="text/template">

<aside class="notes"><p>If we zoom out to include all data points, it is evident that the two largest eruption
simulations follow a way less steep gradient than the HadCM3 data does.</p>
<p>The two largest (green and orange) start off similarly, but on a loop trajectory, where
the intermediate data points loop cuts off short and thus get on average a steeper
graient than the strong eruption points (close to -10 and -4).</p>
<p>The points from double and overlapping simulation, shown by the red thin diamonds,
places themselves among the points coming from the medium-sized individual simulation,
as expected, and so does the data from the strong, high latitude eruption.</p>
<p>The peak values from the three main equatorial simulations are shown as the red circles.
The peak value from the Pinatubo times 100 simulation (from
<a href="https://doi.org/10.1007/s00382-005-0066-8">Jones et al. (2005)</a>) is shown with a pink
square. While the magnitude of the radiative forcing obtained from this simulation of a
super-eruption seems to be too small when compared to the &quot;-19&quot; gradient line, compared
to the simulations done here with CESM2, it fits in well with how an even stronger
eruptions loop trajectory might look like.</p>
<p>Filling out this radiative forcing-AOD space may give a clearer answer to whether there
is a linear relation to be found, and possibly its range of validity. And even if there
is no linear relationship, the loop that is drawn out by the strongest eruption may hint
to there being different dynamical processes at play during the initial rise and the
slow decay to equilibrium when comparing radiative forcing and aerosol optical depth.</p>

<aside class="notes"><p>To look further into what is happening with the loop, we take all our simulations of
single volcanic eruptions, align them so that the eruption day is at time zero, and
compute seasonal means to increase the temporal resolution.</p>
<p>The data is in this case plotted with the same shape as before, but the colour now
indicate the time after the eruption. From this view, one clearly finds that the start
is the lower branch of the loop while the decay is the upper branch.</p>
<p>The lower branch occurs over at time of approximately $0$ to $1.2$ years after the
eruption. From about $1.2$ to $3$ years after the eruption the upper branch of decay
occur.</p>
<p>This give a slight indication that the lower branch bends and therefore have a varying
ratio of forcing to AOD, while the upper branch is close to linear with a constant
ratio.</p>

<!-- .slide: data-background-size="contain" -->
<!-- .slide:
data-background="https://raw.githubusercontent.com/engeir/presentations/96eb73f/2023/fysikermotet23/assets/aod_vs_toa_avg_loop_ratio.webp"
-->

<aside class="notes"><p>We next plot the ratio of radiative forcing to AOD, and split this into before the peak
and after the peak, that is, from (after) $0$ to $1.2$ years and from (after) $1.2$ to
$3$ years.</p>
<p>The values on the right side give the slopes of linear fits of the data, where the pairs
of values follow the same order from top to bottom as the legend, and the upper value
within a pair represent the first time period.</p>
<p>There is a clear distinction between the two periods, which suggest that the dynamics
happening shortly after the eruption and during the decay phase are different.</p>
<p>A second feature is the smaller magnitude of ratios we get for larger eruptions, i.e.,
that the radiative forcing is smaller for the same amount of AOD the stronger the
eruption is. This reduction of forcing efficiency has been reported in different studies
before, some relating to geoengineering using aerosols to mitigate global warming
(<a href="https://doi.org/10.1029/2020GL090241">Marshall et al. 2019</a> and references therein).</p>

<!-- .slide: data-background-size="contain" -->
<!-- .slide:
data-background="https://raw.githubusercontent.com/engeir/presentations/96eb73f/2023/fysikermotet23/assets/toa_arrays_normalized.webp"
-->

<aside class="notes"><p>By plotting the normalized radiative forcing time series, we find them to have very
similar shapes across the whole ensemble of different strengths.</p>
<p>One time series break the pattern more than the rest, which is one of the two Northern
Hemisphere strong eruptions, but the general shape of the radiative forcing still is
very consistent.</p>
</aside></script></section><section data-markdown><script type="text/template">
<!-- .slide: data-background-size="contain" -->
<!-- .slide:
data-background="https://raw.githubusercontent.com/engeir/presentations/96eb73f/2023/fysikermotet23/assets/aod_arrays_normalized.webp"
-->

<aside class="notes"><p>Looking instead at the normalized AOD time series, one thing stands out, which is that
the early phase is steeper for the weaker eruptions, but that the decay still happen at
a similar time and rate as the stronger eruptions. The weaker eruption has a longer
plateau where it peaks, making the decaying phase being mostly similar in timing to the
other eruptions AOD time series.</p>
</aside></script></section><section data-markdown><script type="text/template">
<!-- .slide: data-background-size="contain" -->
<!-- .slide:
data-background="https://raw.githubusercontent.com/engeir/presentations/96eb73f/2023/fysikermotet23/assets/aod_toa_arrays_normalized.webp"
-->

<aside class="notes"><p>AOD and RF normalized in the same figure, where time series with peaks at negative one
are RF while positive one are AOD.</p>
<p>So, what makes the AOD time series depend on eruption magnitude? Could be
(<a href="https://doi.org/10.1029/2020GL090241">Marshall et al. 2019</a>):</p>
<ol>
<li>Growth phase<ul>
<li>Particles grow and coagulate</li>
<li>Aerosol removal mainly dependant on latitude rather than SO2 emission</li>
</ul>
</li>
<li>Sedimentation phase<ul>
<li>Occurs &quot;after several months&quot; when particle growth has slowed</li>
<li>Sedimentation becomes relatively more important</li>
<li>Longer air residence time and subsequent growth to larger particles for SO2
injections above ~22km increases the sedimentation rate and hence aerosol decay in
the second phase</li>
</ul>
</li>
</ol>
</aside></script></section></section><section  data-markdown><script type="text/template">
