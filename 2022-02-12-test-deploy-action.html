<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Test Deploy Workflow</title>
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./dist/reset.css" />
    <link rel="stylesheet" href="./dist/reveal.css" />
    <link rel="stylesheet" href="./dist/reveal.css" />
    <link rel="stylesheet" href="./assets/theme/my-theme.css" id="theme" />
    <link rel="stylesheet" href="./css/highlight/base16/zenburn.css" />
    <link rel="stylesheet" href="./plugin/drawer/drawer.css" />
    <link rel="stylesheet" href="./plugin/pointer/pointer.css" />
    <link rel="stylesheet" href="./plugin/copycode/copycode.css" />
    <link rel="stylesheet" href="./plugin/highlight/gruvbox-dark-medium.css" />

  </head>
  <body>
    <div class="reveal">
      <div class="slides"><section ><section data-markdown><script type="text/template">

# Automatic Deploy

This file was created on github, just on the website.
</script></section><section data-markdown><script type="text/template">
# Then...

The workflow took care of it and generated the static site!
</script></section></section></div>
    </div>

    <script src="./dist/reveal.js"></script>

    <script src="./plugin/markdown/markdown.js"></script>
    <script src="./plugin/highlight/highlight.js"></script>
    <script src="./plugin/zoom/zoom.js"></script>
    <script src="./plugin/notes/notes.js"></script>
    <script src="./plugin/math/math.js"></script>
    <script src="./plugin/drawer/drawer.js"></script>
    <script src="./plugin/pointer/pointer.js"></script>
    <script src="./plugin/copycode/copycode.js"></script>
    <script src="./plugin/animated/revealjs-animated.js"></script>
    <script src="./plugin/elapsed-time-bar/elapsed-time-bar.js"></script>
    <script>
      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

      // default options to init reveal.js
      var defaultOptions = {
        controls: true,
        progress: true,
        history: true,
        center: true,
        transition: 'default', // none/fade/slide/convex/concave/zoom
        plugins: [
          RevealMarkdown,
          RevealHighlight,
          RevealZoom,
          RevealNotes,
          RevealMath,
          CopyCode,
          RevealPointer,
          RevealDrawer
        ]
      };

      // options from URL query string
      var queryOptions = Reveal().getQueryHash() || {};

      var options = extend(defaultOptions, {"auto-animate":true,"controls":true,"progress":true,"history":true,"center":true,"transition":"slide"}, queryOptions);
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.6/clipboard.min.js"></script>

    <script>
      Reveal.initialize(options)
    </script>
  </body>
</html>
