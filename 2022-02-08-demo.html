def count_printed_lines(i: int) -> int:
    """Run the print loop.

    Parameters
    ----------
    i: int
        How many lines to print

    Returns
    -------
    int
        The number of lines that was printed
    """
    for i in range(3):
        print(f"Do nothing, just print line {i}")

def main() -> None:
    i = 9
    _ = count_printed_lines(i)

if __name__ == "__main__":
    main()

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

      // default options to init reveal.js
      var defaultOptions = {
        controls: true,
        progress: true,
        history: true,
        center: true,
        transition: 'default', // none/fade/slide/convex/concave/zoom
        plugins: [
          RevealMarkdown,
          RevealHighlight,
          RevealZoom,
          RevealNotes,
          RevealMath,
          CopyCode,
          RevealPointer,
          RevealDrawer
        ]
      };

      // options from URL query string
      var queryOptions = Reveal().getQueryHash() || {};

      var options = extend(defaultOptions, {"transition":"fade","allottedTime":900000,"controls":true,"progress":true,"history":true,"center":true,"auto-animate":true}, queryOptions);
    </script>
